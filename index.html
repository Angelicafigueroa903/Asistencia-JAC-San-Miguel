<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-50">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAC San Miguel - Directorio con Excel</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- LIBRERÍA EXCEL -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body class="h-full text-slate-800 flex flex-col antialiased">

    <main class="max-w-6xl mx-auto w-full p-6">

        <div id="section-directorio" class="space-y-6">

            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm space-y-6">

                <div>
                    <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2 mb-1">
                        <i data-lucide="contact-2" class="text-emerald-600 w-5 h-5"></i>
                        Directorio de Socios
                    </h2>

                    <p class="text-xs text-slate-500">
                        Registrar socios manualmente o cargar Excel
                    </p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

                    <!-- FORMULARIO -->
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-150 space-y-3 h-fit">

                        <h3 class="text-xs font-bold uppercase text-slate-500">
                            Registrar Socio
                        </h3>

                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">
                                Nombre Completo
                            </label>

                            <input type="text" id="rosterNameInput"
                                placeholder="Ej. Carlos Arturo Marín"
                                class="w-full px-3 py-2 text-xs rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium">
                        </div>

                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">
                                Cédula
                            </label>

                            <input type="number" id="rosterIdInput"
                                placeholder="Ej. 107524589"
                                class="w-full px-3 py-2 text-xs rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium">
                        </div>

                        <button id="addRosterMemberBtn"
                            class="w-full py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs rounded-lg transition flex items-center justify-center gap-1 shadow-sm">

                            <i data-lucide="user-plus-2" class="w-4 h-4"></i>
                            Guardar Socio

                        </button>

                        <!-- IMPORTAR EXCEL -->

                        <div class="pt-4 border-t border-slate-200">

                            <input type="file"
                                id="importRosterFile"
                                accept=".xlsx,.xls"
                                class="hidden">

                            <button
                                onclick="document.getElementById('importRosterFile').click()"
                                class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs rounded-lg transition flex items-center justify-center gap-1 shadow-sm">

                                <i data-lucide="upload" class="w-4 h-4"></i>
                                Cargar Excel

                            </button>

                            <p class="text-[10px] text-slate-400 mt-2 text-center">
                                Formato Excel:
                                Nombre Completo | Cédula
                            </p>

                        </div>

                    </div>

                    <!-- TABLA -->

                    <div class="md:col-span-2 flex flex-col h-[500px]">

                        <div class="flex justify-between items-center mb-2">

                            <span class="text-xs font-bold text-slate-500"
                                id="rosterCountText">

                                Socios Registrados: 0

                            </span>

                        </div>

                        <div class="flex-1 border border-slate-100 rounded-xl bg-slate-50 overflow-y-auto custom-scrollbar">

                            <table class="w-full text-left text-xs">

                                <thead
                                    class="bg-slate-100 sticky top-0 text-slate-500 font-bold uppercase text-[9px] tracking-wider">

                                    <tr>
                                        <th class="p-3">Nombre</th>
                                        <th class="p-3">Cédula</th>
                                        <th class="p-3 text-right">Acción</th>
                                    </tr>

                                </thead>

                                <tbody id="rosterTableBody"
                                    class="divide-y divide-slate-100">

                                    <tr id="emptyRosterRow">

                                        <td colspan="3"
                                            class="p-8 text-center text-slate-400">

                                            No hay socios registrados.

                                        </td>

                                    </tr>

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <!-- TOAST -->

    <div id="toast"
        class="fixed bottom-5 right-5 bg-slate-900 text-white text-xs font-semibold py-3 px-5 rounded-xl shadow-lg opacity-0 transition-all duration-300">

        <span id="toastMessage">Mensaje</span>

    </div>

    <script>

        let roster = [];

        const rosterNameInput = document.getElementById('rosterNameInput');
        const rosterIdInput = document.getElementById('rosterIdInput');
        const addRosterMemberBtn = document.getElementById('addRosterMemberBtn');
        const rosterTableBody = document.getElementById('rosterTableBody');
        const emptyRosterRow = document.getElementById('emptyRosterRow');
        const rosterCountText = document.getElementById('rosterCountText');
        const importRosterFile = document.getElementById('importRosterFile');

        // CARGAR DATOS

        function loadRoster() {

            const data = localStorage.getItem('jac_roster');

            if (data) {
                roster = JSON.parse(data);
            }

            renderRoster();

        }

        // GUARDAR

        function saveRoster() {

            localStorage.setItem('jac_roster', JSON.stringify(roster));

        }

        // RENDER TABLA

        function renderRoster() {

            const rows = Array.from(
                rosterTableBody.querySelectorAll('tr:not(#emptyRosterRow)')
            );

            rows.forEach(r => r.remove());

            rosterCountText.textContent =
                `Socios Registrados: ${roster.length}`;

            if (roster.length === 0) {

                emptyRosterRow.classList.remove('hidden');
                return;

            }

            emptyRosterRow.classList.add('hidden');

            roster.forEach(member => {

                const tr = document.createElement('tr');

                tr.innerHTML = `
                    <td class="p-3 font-bold text-slate-700">
                        ${member.nombre}
                    </td>

                    <td class="p-3 text-slate-500">
                        ${member.cedula}
                    </td>

                    <td class="p-3 text-right">

                        <button
                            onclick="deleteMember('${member.cedula}')"
                            class="text-red-600 hover:text-red-800">

                            Eliminar

                        </button>

                    </td>
                `;

                rosterTableBody.appendChild(tr);

            });

        }

        // AGREGAR MANUAL

        addRosterMemberBtn.addEventListener('click', () => {

            const nombre = rosterNameInput.value.trim();
            const cedula = rosterIdInput.value.trim();

            if (!nombre || !cedula) {

                showToast('Completa todos los campos');
                return;

            }

            const existe = roster.some(
                m => m.cedula === cedula
            );

            if (existe) {

                showToast('La cédula ya existe');
                return;

            }

            roster.push({
                nombre,
                cedula
            });

            saveRoster();
            renderRoster();

            rosterNameInput.value = '';
            rosterIdInput.value = '';

            showToast('Socio registrado');

        });

        // IMPORTAR EXCEL

        importRosterFile.addEventListener('change', function (event) {

            const file = event.target.files[0];

            if (!file) return;

            const reader = new FileReader();

            reader.onload = function (e) {

                const data = new Uint8Array(e.target.result);

                const workbook = XLSX.read(data, {
                    type: 'array'
                });

                const sheetName = workbook.SheetNames[0];

                const worksheet =
                    workbook.Sheets[sheetName];

                const jsonData =
                    XLSX.utils.sheet_to_json(worksheet);

                let nuevos = 0;

                jsonData.forEach(row => {

                    const nombre =
                        (row["Nombre Completo"] || "")
                        .toString()
                        .trim();

                    const cedula =
                        (row["Cédula"] || "")
                        .toString()
                        .trim();

                    if (!nombre || !cedula) return;

                    const existe = roster.some(
                        m => m.cedula === cedula
                    );

                    if (!existe) {

                        roster.push({
                            nombre,
                            cedula
                        });

                        nuevos++;

                    }

                });

                saveRoster();
                renderRoster();

                showToast(
                    `${nuevos} socios cargados desde Excel`
                );

            };

            reader.readAsArrayBuffer(file);

        });

        // ELIMINAR

        function deleteMember(cedula) {

            if (!confirm('¿Eliminar socio?')) return;

            roster = roster.filter(
                m => m.cedula !== cedula
            );

            saveRoster();
            renderRoster();

            showToast('Socio eliminado');

        }

        // TOAST

        function showToast(message) {

            const toast =
                document.getElementById('toast');

            const toastMessage =
                document.getElementById('toastMessage');

            toastMessage.textContent = message;

            toast.classList.remove('opacity-0');

            setTimeout(() => {

                toast.classList.add('opacity-0');

            }, 3000);

        }

        // INICIO

        window.onload = () => {

            loadRoster();

            lucide.createIcons();

        };

    </script>

</body>

</html>
