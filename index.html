<div class="mt-4 p-4 bg-blue-50 border border-blue-100 rounded-xl">
    <h3 class="text-xs font-bold text-blue-800 mb-2">Carga Masiva (Excel/CSV)</h3>
    <p class="text-[10px] text-blue-600 mb-3">Sube un archivo .csv con columnas "Nombre" y "Cedula".</p>
    <input type="file" id="csvFileInput" accept=".csv" class="text-xs text-slate-600">
</div>

<script>
    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const rows = text.split('\n');
            // Saltamos la cabecera (i=1)
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',');
                if (cols.length >= 2) {
                    const nombre = cols[0].replace(/"/g, '').trim();
                    const cedula = cols[1].replace(/"/g, '').trim();
                    if (cedula && !roster.some(m => m.cedula === cedula)) {
                        roster.push({ nombre, cedula });
                    }
                }
            }
            saveConfig();
            renderRosterManagement();
            renderRosterPanel();
            showToast("¡Socios cargados masivamente!");
        };
        reader.readAsText(file);
    });
</script>
