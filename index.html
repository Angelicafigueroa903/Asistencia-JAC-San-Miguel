<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAC San Miguel - Control Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-full">
    <nav class="bg-emerald-600 p-4 text-white flex gap-4 justify-center">
        <button onclick="showSection('asistencia')" class="font-bold">Asistencia</button>
        <button onclick="showSection('directorio')" class="font-bold">Directorio</button>
        <button onclick="showSection('config')" class="font-bold">Ajustes</button>
    </nav>

    <main class="p-6 max-w-4xl mx-auto">
        <section id="asistencia" class="space-y-4">
            <h2 class="text-xl font-bold">Control de Asistencia</h2>
            <div id="rosterList" class="bg-white p-4 rounded shadow"></div>
        </section>

        <section id="directorio" class="hidden space-y-4">
            <h2 class="text-xl font-bold">Directorio de Socios</h2>
            
            <div class="bg-blue-50 p-6 rounded-xl border border-blue-200">
                <h3 class="font-bold text-blue-800">Carga Masiva de Socios</h3>
                <p class="text-sm text-blue-600 mb-2">Selecciona tu archivo .csv (Formato: Nombre,Cedula)</p>
                <input type="file" id="csvFile" accept=".csv" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700">
            </div>

            <div id="directorioList" class="bg-white p-4 rounded shadow h-96 overflow-y-auto"></div>
        </section>

        <section id="config" class="hidden">
            <h2 class="text-xl font-bold">Ajustes</h2>
            <p>Socios Habilitados: <input type="number" id="totalSocios" value="300" class="border p-1 rounded"></p>
            <button onclick="localStorage.clear(); location.reload();" class="mt-4 bg-red-600 text-white p-2 rounded">Borrar Todo (Reset)</button>
        </section>
    </main>

    <script>
        let roster = JSON.parse(localStorage.getItem('roster')) || [];

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split('\n');
                lines.forEach((line, index) => {
                    if (index === 0) return;
                    const [nombre, cedula] = line.split(',');
                    if (nombre && cedula) roster.push({ nombre: nombre.trim(), cedula: cedula.trim() });
                });
                localStorage.setItem('roster', JSON.stringify(roster));
                alert('¡Socios cargados correctamente!');
                renderList();
            };
            reader.readAsText(file);
        });

        function renderList() {
            const list = document.getElementById('directorioList');
            list.innerHTML = roster.map(s => `<div>${s.nombre} - ${s.cedula}</div>`).join('');
        }

        window.onload = renderList;
    </script>
</body>
</html>
