<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAC San Miguel</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
    background:#f8fafc;
}
.custom-scrollbar::-webkit-scrollbar{
    width:6px;
}
.custom-scrollbar::-webkit-scrollbar-thumb{
    background:#cbd5e1;
    border-radius:20px;
}
</style>
</head>

<body class="min-h-screen">

<div class="max-w-7xl mx-auto p-4">

<div class="bg-emerald-600 text-white rounded-2xl p-5 mb-5 shadow-lg">
    <h1 class="text-2xl font-black">JAC SAN MIGUEL</h1>
    <p class="text-sm opacity-90">
        Sistema Offline de Asistencia Mensual
    </p>
</div>

<div class="grid md:grid-cols-4 gap-4 mb-5">

<div id="quorumCard" class="bg-white rounded-2xl p-5 shadow border">
    <div class="text-xs uppercase text-slate-400 font-bold">
        Estado
    </div>

    <div id="quorumStatusText" class="text-xl font-black mt-2">
        Sin calcular
    </div>

    <div class="w-full bg-slate-200 rounded-full h-3 mt-4">
        <div id="quorumProgressBar"
        class="bg-emerald-600 h-3 rounded-full"
        style="width:0%"></div>
    </div>

    <div id="quorumHelperText"
    class="text-xs text-slate-500 mt-2">
    </div>
</div>

<div class="bg-white rounded-2xl p-5 shadow border">
    <div class="text-xs uppercase text-slate-400 font-bold">
        Socios Habilitados
    </div>

    <div id="totalSociosText"
    class="text-4xl font-black mt-2">
        300
    </div>
</div>

<div class="bg-white rounded-2xl p-5 shadow border">
    <div class="text-xs uppercase text-slate-400 font-bold">
        Presentes
    </div>

    <div id="presentCountText"
    class="text-4xl font-black mt-2">
        0
    </div>
</div>

<div class="bg-white rounded-2xl p-5 shadow border">
    <div class="text-xs uppercase text-slate-400 font-bold">
        Participación
    </div>

    <div id="presentPercentText"
    class="text-2xl font-black mt-2">
        0%
    </div>
</div>

</div>

<div class="grid lg:grid-cols-2 gap-5">

<div class="bg-white rounded-2xl p-5 shadow border">

<h2 class="font-black text-lg mb-4">
Registrar Socio
</h2>

<div class="grid gap-3">

<input type="text"
id="nombreInput"
placeholder="Nombre Completo"
class="border rounded-xl p-3 text-sm">

<input type="text"
id="documentoInput"
placeholder="Documento"
class="border rounded-xl p-3 text-sm">

<input type="text"
id="tipoDocumentoInput"
placeholder="Tipo Documento"
class="border rounded-xl p-3 text-sm">

<input type="text"
id="lugarExpedicionInput"
placeholder="Lugar Expedición"
class="border rounded-xl p-3 text-sm">

<input type="date"
id="fechaNacimientoInput"
class="border rounded-xl p-3 text-sm">

<input type="text"
id="lugarNacimientoInput"
placeholder="Lugar Nacimiento"
class="border rounded-xl p-3 text-sm">

<input type="text"
id="generoInput"
placeholder="Género"
class="border rounded-xl p-3 text-sm">

<input type="text"
id="rhInput"
placeholder="RH"
class="border rounded-xl p-3 text-sm">

<input type="number"
id="edadInput"
placeholder="Edad"
class="border rounded-xl p-3 text-sm">

<input type="text"
id="cargoInput"
placeholder="Cargo"
class="border rounded-xl p-3 text-sm">

<button onclick="agregarSocio()"
class="bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl p-3 font-bold">
Guardar Socio
</button>

<input type="file"
id="excelInput"
accept=".xlsx,.xls"
class="border rounded-xl p-3 text-sm">

<button onclick="cargarExcel()"
class="bg-blue-600 hover:bg-blue-700 text-white rounded-xl p-3 font-bold">
Cargar Excel
</button>

</div>

</div>

<div class="bg-white rounded-2xl p-5 shadow border">

<div class="flex justify-between items-center mb-4">
<h2 class="font-black text-lg">
Asistencia Mensual
</h2>

<select id="meetingMonth"
class="border rounded-lg p-2 text-sm"
onchange="cambiarMes()">

<option>Enero</option>
<option>Febrero</option>
<option>Marzo</option>
<option>Abril</option>
<option>Mayo</option>
<option>Junio</option>
<option>Julio</option>
<option>Agosto</option>
<option>Septiembre</option>
<option>Octubre</option>
<option>Noviembre</option>
<option>Diciembre</option>

</select>
</div>

<div class="overflow-auto max-h-[500px] custom-scrollbar">

<table class="w-full text-sm">

<thead class="bg-slate-100 sticky top-0">
<tr>
<th class="p-2 text-left">Nombre</th>
<th class="p-2 text-left">Documento</th>
<th class="p-2 text-center">Asistencia</th>
</tr>
</thead>

<tbody id="tablaSocios">

</tbody>

</table>

</div>

<button onclick="exportarExcel()"
class="mt-4 w-full bg-slate-800 hover:bg-slate-900 text-white rounded-xl p-3 font-bold">
Exportar Asistencia Excel
</button>

</div>

</div>

</div>

<script>

let totalSocios = 300;

let quorumPercent = 50;

let socios = JSON.parse(localStorage.getItem("socios")) || [];

let asistencias = JSON.parse(localStorage.getItem("asistencias")) || [];

let meetingMonth = "Mayo";

document.getElementById("meetingMonth").value = meetingMonth;

function guardarTodo(){

    localStorage.setItem(
        "socios",
        JSON.stringify(socios)
    );

    localStorage.setItem(
        "asistencias",
        JSON.stringify(asistencias)
    );

}

function agregarSocio(){

    const socio = {

        nombre:
        document.getElementById("nombreInput").value,

        documento:
        document.getElementById("documentoInput").value,

        tipoDocumento:
        document.getElementById("tipoDocumentoInput").value,

        lugarExpedicion:
        document.getElementById("lugarExpedicionInput").value,

        fechaNacimiento:
        document.getElementById("fechaNacimientoInput").value,

        lugarNacimiento:
        document.getElementById("lugarNacimientoInput").value,

        genero:
        document.getElementById("generoInput").value,

        rh:
        document.getElementById("rhInput").value,

        edad:
        document.getElementById("edadInput").value,

        cargo:
        document.getElementById("cargoInput").value

    };

    if(
        !socio.nombre ||
        !socio.documento
    ){
        alert("Complete nombre y documento");
        return;
    }

    socios.push(socio);

    guardarTodo();

    renderSocios();

}

function renderSocios(){

    const tabla =
    document.getElementById("tablaSocios");

    tabla.innerHTML = "";

    socios.forEach((socio,index)=>{

        const presente =
        asistencias.some(a=>

            a.documento === socio.documento &&
            a.mes === meetingMonth

        );

        tabla.innerHTML += `

        <tr class="border-b">

        <td class="p-2">
        ${socio.nombre}
        </td>

        <td class="p-2">
        ${socio.documento}
        </td>

        <td class="p-2 text-center">

        ${
            presente

            ?

            `<span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold">
            PRESENTE
            </span>`

            :

            `<button
            onclick="registrarAsistencia('${socio.documento}')"
            class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded-lg text-xs font-bold">
            Registrar
            </button>`
        }

        </td>

        </tr>

        `;

    });

    calcularQuorum();

}

function registrarAsistencia(documento){

    const socio =
    socios.find(s=>
        s.documento === documento
    );

    if(!socio) return;

    const existe =
    asistencias.some(a=>

        a.documento === documento &&
        a.mes === meetingMonth

    );

    if(existe){
        alert("Ya registrado");
        return;
    }

    asistencias.push({

        nombre:socio.nombre,

        documento:socio.documento,

        mes:meetingMonth,

        fecha:new Date().toLocaleDateString(),

        hora:new Date().toLocaleTimeString()

    });

    guardarTodo();

    renderSocios();

}

function calcularQuorum(){

    const presentes =
    asistencias.filter(a=>
        a.mes === meetingMonth
    ).length;

    const minimo =
    Math.floor(
        totalSocios *
        (quorumPercent/100)
    ) + 1;

    const porcentaje =
    Math.round(
        (presentes/totalSocios)*100
    );

    document.getElementById(
        "totalSociosText"
    ).innerText = totalSocios;

    document.getElementById(
        "presentCountText"
    ).innerText = presentes;

    document.getElementById(
        "presentPercentText"
    ).innerText = porcentaje + "%";

    document.getElementById(
        "quorumHelperText"
    ).innerText =
    `Mínimo requerido: ${minimo}`;

    const progreso =
    (presentes/minimo)*100;

    document.getElementById(
        "quorumProgressBar"
    ).style.width =
    progreso + "%";

    if(presentes >= minimo){

        document.getElementById(
            "quorumStatusText"
        ).innerText =
        "SI HAY QUÓRUM";

        document.getElementById(
            "quorumCard"
        ).className =
        "bg-emerald-50 rounded-2xl p-5 shadow border border-emerald-300";

    }else{

        document.getElementById(
            "quorumStatusText"
        ).innerText =
        "NO HAY QUÓRUM";

        document.getElementById(
            "quorumCard"
        ).className =
        "bg-rose-50 rounded-2xl p-5 shadow border border-rose-300";

    }

}

function cambiarMes(){

    meetingMonth =
    document.getElementById(
        "meetingMonth"
    ).value;

    renderSocios();

}

function exportarExcel(){

    const datos =
    asistencias.filter(a=>
        a.mes === meetingMonth
    );

    const worksheet =
    XLSX.utils.json_to_sheet(datos);

    const workbook =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        workbook,
        worksheet,
        "Asistencia"
    );

    XLSX.writeFile(
        workbook,
        `Asistencia_${meetingMonth}.xlsx`
    );

}

function cargarExcel(){

    const file =
    document.getElementById("excelInput")
    .files[0];

    if(!file){
        alert("Seleccione Excel");
        return;
    }

    const reader =
    new FileReader();

    reader.onload = function(e){

        const data =
        new Uint8Array(e.target.result);

        const workbook =
        XLSX.read(data,{
            type:'array'
        });

        const sheet =
        workbook.Sheets[
            workbook.SheetNames[0]
        ];

        const json =
        XLSX.utils.sheet_to_json(sheet);

        json.forEach(row=>{

            socios.push({

                nombre:
                row["Nombre"] || "",

                documento:
                row["Documento"] || "",

                tipoDocumento:
                row["Tipo Documento"] || "",

                lugarExpedicion:
                row["Lugar Expedicion"] || "",

                fechaNacimiento:
                row["Fecha Nacimiento"] || "",

                lugarNacimiento:
                row["Lugar Nacimiento"] || "",

                genero:
                row["Genero"] || "",

                rh:
                row["RH"] || "",

                edad:
                row["Edad"] || "",

                cargo:
                row["Cargo"] || ""

            });

        });

        guardarTodo();

        renderSocios();

        alert("Excel cargado correctamente");

    };

    reader.readAsArrayBuffer(file);

}

renderSocios();

</script>

</body>
</html>
